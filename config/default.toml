# Cuervo CLI — Default Configuration
# Override via: ~/.cuervo/config.toml (global) or .cuervo/config.toml (project)
# Environment variables: HALCON_DEFAULT_PROVIDER, HALCON_DEFAULT_MODEL, etc.

[general]
default_provider = "anthropic"
default_model = "claude-sonnet-4-6"
max_tokens = 8192
temperature = 0.0

[models.providers.anthropic]
enabled = true
api_base = "https://api.anthropic.com"
api_key_env = "ANTHROPIC_API_KEY"
default_model = "claude-sonnet-4-6"

[models.providers.ollama]
enabled = true
api_base = "http://localhost:11434"
default_model = "llama3.2"

[models.providers.openai]
enabled       = false
api_base      = "https://api.openai.com/v1"
api_key_env   = "OPENAI_API_KEY"
default_model = "gpt-4o"

[models.providers.deepseek]
enabled       = false
api_base      = "https://api.deepseek.com"
api_key_env   = "DEEPSEEK_API_KEY"
default_model = "deepseek-chat"

[models.providers.gemini]
enabled       = false
api_base      = "https://generativelanguage.googleapis.com"
api_key_env   = "GEMINI_API_KEY"
default_model = "gemini-2.0-flash"

# Cenzontle — plataforma AI propia de Zuclubit (SSO OAuth 2.1 PKCE)
# Autenticación: halcon login cenzontle  o  CENZONTLE_ACCESS_TOKEN
[models.providers.cenzontle]
enabled       = true
api_base      = "https://api-cenzontle.zuclubit.com"
api_key_env   = "CENZONTLE_ACCESS_TOKEN"
default_model = "claude-sonnet-4-6"

# AWS Bedrock — activar con CLAUDE_CODE_USE_BEDROCK=1
# Requiere: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
[models.providers.bedrock]
enabled       = false
region        = "us-east-1"
default_model = "anthropic.claude-sonnet-4-6"
cross_region  = false

# Azure AI Foundry — activar con CLAUDE_CODE_USE_AZURE=1
# Requiere: AZURE_AI_ENDPOINT, AZURE_API_KEY (o AZURE_CLIENT_ID + AZURE_TENANT_ID)
[models.providers.azure_foundry]
enabled       = false
endpoint_env  = "AZURE_AI_ENDPOINT"
api_key_env   = "AZURE_API_KEY"
default_model = "claude-sonnet-4-6"
api_version   = "2024-05-01-preview"

# Google Vertex AI — activar con CLAUDE_CODE_USE_VERTEX=1
# Requiere: ANTHROPIC_VERTEX_PROJECT_ID, GOOGLE_APPLICATION_CREDENTIALS (o gcloud ADC)
[models.providers.vertex]
enabled       = false
project_env   = "ANTHROPIC_VERTEX_PROJECT_ID"
region        = "us-east5"
default_model = "claude-sonnet-4-6"

# MCP servers — halcon connects to these as MCP clients
# Transport: stdio (spawn child process) or ws (WebSocket, for remote servers)
#
# Cenzontle exposes its MCP server on the /mcp Socket.io namespace.
# The `ws` transport type connects via WebSocket with Bearer JWT auth.
# Auth token: CENZONTLE_ACCESS_TOKEN env var (set by `halcon login cenzontle`).
[mcp.servers.cenzontle]
enabled   = false
transport = "ws"
url       = "https://api-cenzontle.zuclubit.com"
namespace = "/mcp"
auth_env  = "CENZONTLE_ACCESS_TOKEN"
# Tools exposed: llm_chat, knowledge_search, agent_submit_task,
#                conversation_create, agent_list

[tools]
confirm_destructive = true
timeout_secs = 120
allowed_directories = []
blocked_patterns = [
    "**/.env",
    "**/.env.*",
    "**/credentials.json",
    "**/*.pem",
    "**/*.key",
]

[reasoning]
# Enable the ReasoningEngine for quality-aware model selection, UCB1 learning,
# and adaptive retry logic. Previously required --expert flag.
enabled = true
# Adversarial LoopCritic: a second LLM call after the agent loop evaluates whether
# the original goal was truly achieved. Catches hallucinated/fabricated synthesis.
# Adds ~1–3s latency.
enable_loop_critic = true
# Max seconds for the LoopCritic evaluation. Critic is skipped if it times out.
critic_timeout_secs = 30

[security]
pii_detection = true
pii_action = "warn"
audit_enabled = true
# Maximum seconds to wait for a permission prompt before auto-denying the tool.
# 0 = unlimited wait (legacy behavior). Recommended: 60 for interactive, 30 for CI.
# When triggered: tool is denied with reason "permission_timeout", user is notified.
# Wave 3: Activated at 60s to resolve CR-2 (unbounded permission wait).
permission_timeout_secs = 60

[security.analysis_mode]
# When true, bash commands matching analysis_tool_whitelist patterns auto-approve
# without interactive user confirmation. This prevents stall loops in analysis tasks.
# IMPORTANT: Only safe read-only commands should be whitelisted.
enabled = false
# Bash command prefixes auto-approved for analysis tasks (regex, matched against start of command).
# These are read-only analysis tools that have no destructive side effects.
allow_grep_recursive = true
allow_find_project_files = true
# Full whitelist of allowed bash command prefixes in analysis_mode.
# Commands starting with any of these are auto-approved when enabled=true.
analysis_tool_whitelist = [
    "grep ",
    "grep -",
    "rg ",
    "find . ",
    "find src",
    "find crates",
    "cat ",
    "head ",
    "tail ",
    "wc ",
    "ls ",
    "cargo audit",
    "cargo check",
    "cargo test --",
    "npm audit",
    "npm ls",
    "yarn audit",
    "git log ",
    "git diff ",
    "git status",
    "git show ",
]

[storage]
max_sessions = 1000
max_session_age_days = 90

[agent.routing]
paloma_enabled = true
strategy = "balanced"
mode = "failover"
max_retries = 1

[logging]
level = "info"
format = "pretty"
