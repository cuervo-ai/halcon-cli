# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# A list of advisory IDs to ignore
ignore = [
    # Example: "RUSTSEC-2020-0001",
]

[licenses]
# We want to deny any crate that uses a license not in this list.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MPL-2.0",
    "ISC",
    "OpenSSL",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "Zlib",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "0BSD",
    "OFL-1.1",
    "Unicode-3.0",
]

# Custom/non-SPDX licenses that are permissive
[[licenses.exceptions]]
name = "epaint_default_fonts"
allow = ["LicenseRef-UFL-1.0"]
# Crates without a detectable license or with licenses not in the allow list
# are denied by default in cargo-deny v2 (allow-list mode).
# Copyleft licenses (GPL, LGPL, AGPL) are not in the allow list → denied.
unused-allowed-license = "allow"

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`
wildcards = "warn"
# The graph highlighting used when creating dotgraphs for crates
highlight = "all"
# Blanket list of crates to deny
deny = [
    # Avoid unmaintained crates with known security issues
    # { name = "openssl", version = "*" },
]
# Allow certain crates to appear multiple times
skip = []
skip-tree = []

[sources]
# Lint level for what to happen when a crate from a crate registry that is not
# in the allow list is encountered
unknown-registry = "deny"
# Lint level for what to happen when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
