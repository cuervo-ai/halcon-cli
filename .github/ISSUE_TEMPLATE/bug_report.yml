name: Bug Report
description: Report a bug in Cuervo CLI
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: Cuervo CLI Version
      description: Output of `cuervo --version`
      placeholder: "cuervo 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (aarch64)
        - Windows
        - Other
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      description: Which AI provider were you using?
      options:
        - Anthropic
        - OpenAI
        - DeepSeek
        - Gemini
        - Ollama (local)
        - Other
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Run with `CUERVO_LOG=debug` for verbose output.
      render: shell
