name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / REPL
        - Agent Loop
        - Tools
        - Providers
        - Context / Memory
        - Planning
        - Plugins
        - Security / Permissions
        - Metrics / Observability
        - TUI
        - MCP Server
        - VS Code Extension
        - Desktop App
        - Git / CI Integration
        - Documentation
        - Other
