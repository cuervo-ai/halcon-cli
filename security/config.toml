# Cuervo CLI - Security Configuration
# This file defines security policies and configurations for the project

[security]
# Security scanning configuration
scanning_enabled = true
auto_remediation = true
fail_on_critical = true

# Vulnerability management
vulnerability_scanning = { enabled = true, frequency = "daily" }
dependency_scanning = { enabled = true, frequency = "on_push" }
secret_detection = { enabled = true, frequency = "on_push" }

# Compliance frameworks
compliance_frameworks = ["gdpr", "soc2", "iso27001", "nist_ai_rmf"]
compliance_scanning = { enabled = true, frequency = "weekly" }

# Container security
container_scanning = { enabled = true, fail_on_high = true }
image_signing = { enabled = true, required = true }

# Runtime protection
runtime_monitoring = { enabled = true, alert_on_anomaly = true }
threat_detection = { enabled = true, real_time = true }

# Reporting
security_reporting = { 
  daily_summary = true, 
  weekly_detailed = true,
  monthly_compliance = true 
}

alerting = { 
  email = true, 
  slack = true, 
  pagerduty = { enabled = true, critical_only = true } 
}

[security.scanning]
# SAST configuration
sast_tools = ["semgrep", "clippy-security", "cargo-audit"]
sast_rules = ["p/rust", "p/ci", "p/security"]

# SCA configuration
sca_tools = ["cargo-audit", "cargo-outdated", "cargo-deny"]
sca_fail_on = ["critical", "high"]

# Secrets detection
secrets_tools = ["trufflehog", "gitleaks"]
secrets_patterns = ["api_key", "secret", "password", "token"]

# Container scanning
container_tools = ["trivy", "anchore"]
container_fail_on = ["critical", "high"]

[security.compliance]
# GDPR compliance
gdpr = {
  enabled = true,
  data_retention_days = 90,
  pii_encryption_required = true,
  right_to_be_forgotten = true
}

# SOC2 compliance
soc2 = {
  enabled = true,
  audit_logging_required = true,
  access_control_required = true,
  change_management_required = true
}

# ISO 27001 compliance
iso27001 = {
  enabled = true,
  risk_assessment_required = true,
  incident_management_required = true,
  business_continuity_required = true
}

# NIST AI RMF compliance
nist_ai_rmf = {
  enabled = true,
  govern = { enabled = true },
  map = { enabled = true },
  measure = { enabled = true },
  manage = { enabled = true }
}

[security.policies]
# Code security policies
code_security = {
  no_hardcoded_secrets = true,
  input_validation_required = true,
  output_encoding_required = true,
  error_handling_required = true
}

# Dependency policies
dependencies = {
  no_unmaintained_crates = true,
  no_known_vulnerabilities = true,
  license_compliance = true,
  provenance_verification = true
}

# Container policies
container = {
  no_root_user = true,
  minimal_base_image = true,
  non_executable_stack = true,
  read_only_root_filesystem = true
}

# Runtime policies
runtime = {
  memory_limit = "512M",
  cpu_limit = "1",
  network_access = "restricted",
  filesystem_access = "read-only"
}

[security.monitoring]
# Application monitoring
application = {
  metrics_collection = true,
  log_collection = true,
  trace_collection = true,
  anomaly_detection = true
}

# Security monitoring
security_events = {
  authentication_events = true,
  authorization_events = true,
  data_access_events = true,
  configuration_change_events = true
}

# Threat detection
threat_detection_rules = [
  { name = "brute_force", pattern = "5_failed_logins_in_1_minute", action = "block" },
  { name = "data_exfiltration", pattern = "large_data_export", action = "alert" },
  { name = "privilege_escalation", pattern = "unusual_permission_change", action = "block" },
  { name = "malicious_code", pattern = "suspicious_system_calls", action = "block" }
]

[security.incident_response]
# Incident classification
incident_severity = {
  critical = { response_time = "15m", resolution_time = "4h" },
  high = { response_time = "1h", resolution_time = "24h" },
  medium = { response_time = "4h", resolution_time = "7d" },
  low = { response_time = "24h", resolution_time = "30d" }
}

# Response procedures
response_procedures = {
  containment = { automated = true, manual = true },
  eradication = { automated = false, manual = true },
  recovery = { automated = true, manual = true },
  lessons_learned = { automated = false, manual = true }
}

# Communication
communication = {
  internal = { slack = true, email = true },
  external = { customers = true, regulators = "as_required" },
  public = { press_releases = "approved_only" }
}

[security.certifications]
# Target certifications
target_certifications = [
  { name = "SOC 2 Type II", target_date = "2026-12-31" },
  { name = "ISO 27001", target_date = "2026-09-30" },
  { name = "GDPR Compliance", target_date = "2026-06-30" },
  { name = "NIST AI RMF", target_date = "2026-03-31" }
]

# Current certifications
current_certifications = [
  { name = "OWASP Compliance", achieved_date = "2026-01-15" },
  { name = "Basic Security", achieved_date = "2026-01-01" }
]

[security.training]
# Security training program
developer_training = {
  required = true,
  frequency = "quarterly",
  topics = ["secure_coding", "threat_modeling", "incident_response"]
}

security_champions = {
  enabled = true,
  ratio = "1:10",  # 1 security champion per 10 developers
  responsibilities = ["code_review", "threat_modeling", "incident_response"]
}

[security.testing]
# Security testing
penetration_testing = {
  enabled = true,
  frequency = "quarterly",
  scope = ["application", "infrastructure", "api"]
}

red_team_exercises = {
  enabled = true,
  frequency = "biannually",
  scope = ["full_stack"]
}

bug_bounty = {
  enabled = true,
  scope = "public",
  rewards = { critical = 10000, high = 5000, medium = 1000, low = 100 }
}

[security.documentation]
# Security documentation
required_documents = [
  "security_policy",
  "incident_response_plan",
  "risk_assessment",
  "compliance_matrix",
  "architecture_diagrams"
]

document_retention = {
  policies = "7_years",
  incident_reports = "7_years",
  audit_logs = "3_years",
  compliance_reports = "5_years"
}

# Security metrics and reporting
[security.metrics]
vulnerability_metrics = {
  mttd = "5m",  # Mean Time to Detect
  mttr = "4h",  # Mean Time to Respond
  mttf = "24h", # Mean Time to Fix
  recurrence_rate = "5%"
}

compliance_metrics = {
  compliance_score = "95%",
  audit_findings = "<5_per_quarter",
  policy_violations = "0"
}

security_operations = {
  alert_volume = "<100_per_day",
  false_positive_rate = "<1%",
  automation_coverage = "90%"
}

# Environment-specific configurations
[security.environments.development]
scanning = { enabled = true, fail_on_critical = false }
monitoring = { enabled = true, alerting = "low" }
access_control = { level = "permissive" }

[security.environments.staging]
scanning = { enabled = true, fail_on_critical = true }
monitoring = { enabled = true, alerting = "medium" }
access_control = { level = "moderate" }

[security.environments.production]
scanning = { enabled = true, fail_on_critical = true }
monitoring = { enabled = true, alerting = "high" }
access_control = { level = "strict" }
incident_response = { automated = true, escalation = "immediate" }

# Integration with external security tools
[security.integrations]
vulnerability_management = {
  tool = "snyk",
  enabled = true,
  api_key_env = "SNYK_API_KEY"
}

secret_management = {
  tool = "hashicorp_vault",
  enabled = true,
  address_env = "VAULT_ADDR"
}

siem = {
  tool = "splunk",
  enabled = true,
  endpoint_env = "SPLUNK_HEC_URL"
}

container_registry = {
  tool = "docker_hub",
  enabled = true,
  scanning = true,
  signing = true
}

# AI-specific security configurations
[security.ai]
model_security = {
  provenance_tracking = true,
  integrity_verification = true,
  bias_detection = true,
  adversarial_testing = true
}

prompt_security = {
  injection_detection = true,
  sanitization = true,
  validation = true
}

data_security = {
  training_data_protection = true,
  inference_data_protection = true,
  differential_privacy = false,  # Enable for sensitive data
  federated_learning = false     # Enable for distributed training
}

# Update and maintenance
[security.maintenance]
patch_management = {
  critical_patches = "24h",
  high_patches = "7d",
  medium_patches = "30d",
  low_patches = "90d"
}

end_of_life = {
  notice_period = "6_months",
  migration_support = "3_months",
  security_support = "1_year"
}

# This configuration file is version controlled and automatically applied
# through the DevSecOps pipeline. Changes require security team approval.
version = "1.0.0"
last_updated = "2026-02-07"
maintainer = "security-team@cuervo.ai"