name = "halcon-releases"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ─── Variables ────────────────────────────────────────────────────────────────
# GITHUB_TOKEN must be set as a Secret in the Cloudflare dashboard (never plaintext)
[vars]
GITHUB_REPO = "cuervo-ai/halcon-cli"
CACHE_TTL   = "300"

# ─── KV namespace binding for manifest caching ────────────────────────────────
# Create with: npx wrangler kv namespace create RELEASES_KV
# Then replace the id below with the real namespace ID
[[kv_namespaces]]
binding = "RELEASES_KV"
id      = "d1ff7daf831c453bb57d214a87d6566e"

# ─── Routes ───────────────────────────────────────────────────────────────────
# releases.cli.cuervo.cloud → binary manifests, checksums, artifact proxy
# Cloudflare manages DNS + TLS for this custom domain automatically.
#
# NOTE: cli.cuervo.cloud is intentionally NOT listed here.
#   It is served by the Cloudflare Pages project "halcon-website"
#   (halcon.cuervo.cloud / cli.cuervo.cloud) which serves install.sh.
[[routes]]
pattern   = "releases.cli.cuervo.cloud/*"
zone_name = "cuervo.cloud"
